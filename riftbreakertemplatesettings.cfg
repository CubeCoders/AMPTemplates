// This file is managed by AMP. Configure settings through the AMP web interface.
// The game ignores everything after // on a line, so those lines act as toggles.
// Do not remove the 'set app_mode "server"' line - the server needs it to start
// headless instead of waiting at the menu.
//
// Advanced/extra options can be added via "Additional Server Settings" in the AMP UI.
// See the EXOR Studios dedicated server guide for the full list of parameters.

set app_mode "server"

set server_name "{{ServerName}}"
set server_password "{{ServerPassword}}"
set server_rcon_password "{{RconPassword}}"
set server_max_players_count "{{MaxPlayers}}"
set server_broadcast_enabled "{{Broadcast}}"
set server_pause_game_when_empty "{{PauseWhenEmpty}}"
set disable_steam "{{DisableSteam}}"

set campaign "{{Campaign}}"
set mission "{{Mission}}"
set difficulty "{{Difficulty}}"

{{UserSettings}}
